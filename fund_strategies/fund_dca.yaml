name: fund_dca
display_name: 定投策略
description: 判断基金是否适合定投，重点关注波动、回撤、长期趋势、基金类型和申购可行性。
category: allocation
required_tools:
  - search_funds
  - get_fund_base_info
  - get_fund_nav_info
  - get_fund_manager_info
default_priority: 20
instructions: |
  适用于用户询问某只基金能否定投、如何分批买入或当前是否适合开始定投。

  判断重点：
  - 指数型、偏股混合、行业主题基金更需要结合波动和回撤判断定投节奏。
  - 货币基金、短债基金通常不是定投策略重点，应更偏现金管理或低波动配置。
  - 波动足够、长期逻辑仍在、回撤可承受时，定投比一次性买入更合理。
  - 若基金长期跑输同类、规模异常、基金经理频繁变动，应降低定投建议等级。
  - 对主动权益、主动混合、主动债券基金，若能识别基金经理姓名或 ID，必须调用 get_fund_manager_info；基金经理任职短、代表产品差、在管产品过多或频繁变更时，应降低定投建议。
  - 对宽基指数、被动指数、ETF 联接、货币基金，基金经理不是定投判断核心，可不调用基金经理工具，但需要说明主要依据是指数/产品属性和波动回撤。

  输出必须给出：
  - 是否适合定投：适合 / 谨慎定投 / 不适合。
  - 建议节奏：月定投、周定投或等待观察。
  - 停止或暂停定投条件。
  - 主动基金的基金经理稳定性判断；如果经理数据缺失，要明确列为数据缺口。
